<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="nailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon background circle -->
  <circle cx="40" cy="40" r="36" fill="#0C1A2E" stroke="url(#nailGrad)" stroke-width="1.5" opacity="0.8"/>
  <circle cx="40" cy="40" r="36" fill="url(#glowGrad)"/>

  <!-- Nail icon: shaft (vertical bar) -->
  <rect x="38" y="20" width="4" height="26" rx="2" fill="url(#nailGrad)" filter="url(#glow)"/>

  <!-- Nail head (wide flat top) -->
  <rect x="30" y="16" width="20" height="7" rx="3.5" fill="url(#nailGrad)" filter="url(#glow)"/>

  <!-- Nail tip (triangle point) -->
  <polygon points="38,46 42,46 40,54" fill="url(#nailGrad)" filter="url(#glow)"/>

  <!-- Checkmark ring / target arc -->
  <path d="M 18 42 A 22 22 0 1 1 62 42" stroke="url(#nailGrad)" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.45"/>

  <!-- Small tick marks on arc -->
  <line x1="40" y1="62" x2="40" y2="66" stroke="#00D4AA" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  <line x1="22" y1="56" x2="20" y2="59" stroke="#00D4AA" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>
  <line x1="58" y1="56" x2="60" y2="59" stroke="#00D4AA" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Wordmark: "Nailed" in teal -->
  <text x="86" y="36" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="url(#nailGrad)" filter="url(#glow)">Nailed</text>

  <!-- Wordmark: "Macros" in light -->
  <text x="86" y="60" font-family="'Inter', 'Segoe UI', system-ui, sans-serif" font-size="22" font-weight="700" letter-spacing="-0.5" fill="#E8F8F5">Macros</text>
</svg>
