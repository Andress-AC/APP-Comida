<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060F1C"/>
      <stop offset="100%" stop-color="#0C1A2E"/>
    </linearGradient>
    <linearGradient id="nailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="44" fill="url(#bgGrad)"/>

  <!-- Outer ring arc -->
  <circle cx="96" cy="96" r="74" fill="none" stroke="url(#nailGrad)" stroke-width="3"
    stroke-linecap="round" stroke-dasharray="360 465" stroke-dashoffset="-30" opacity="0.35"/>

  <!-- Nail head -->
  <rect x="72" y="42" width="48" height="18" rx="9" fill="url(#nailGrad)" filter="url(#glow)"/>

  <!-- Nail shaft -->
  <rect x="87" y="58" width="18" height="66" rx="9" fill="url(#nailGrad)" filter="url(#glow)"/>

  <!-- Nail tip -->
  <polygon points="87,124 105,124 96,148" fill="url(#nailGrad)" filter="url(#glow)"/>

  <!-- Small decorative dots -->
  <circle cx="52" cy="96" r="3.5" fill="#00D4AA" opacity="0.4"/>
  <circle cx="140" cy="96" r="3.5" fill="#38BDF8" opacity="0.4"/>
  <circle cx="96" cy="160" r="3.5" fill="#00D4AA" opacity="0.4"/>
</svg>
