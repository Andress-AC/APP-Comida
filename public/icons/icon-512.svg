<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060F1C"/>
      <stop offset="100%" stop-color="#0C1A2E"/>
    </linearGradient>
    <linearGradient id="nailGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00D4AA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bgGrad)"/>

  <!-- Outer ring arc -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="url(#nailGrad)" stroke-width="6"
    stroke-linecap="round" stroke-dasharray="960 1257" stroke-dashoffset="-80" opacity="0.35"/>

  <!-- Nail head -->
  <rect x="192" y="112" width="128" height="48" rx="24" fill="url(#nailGrad)" filter="url(#glow)"/>

  <!-- Nail shaft -->
  <rect x="232" y="156" width="48" height="176" rx="24" fill="url(#nailGrad)" filter="url(#glow)"/>

  <!-- Nail tip -->
  <polygon points="232,332 280,332 256,396" fill="url(#nailGrad)" filter="url(#glow)"/>

  <!-- Small decorative dots -->
  <circle cx="138" cy="256" r="9" fill="#00D4AA" opacity="0.4"/>
  <circle cx="374" cy="256" r="9" fill="#38BDF8" opacity="0.4"/>
  <circle cx="256" cy="430" r="9" fill="#00D4AA" opacity="0.4"/>
</svg>
